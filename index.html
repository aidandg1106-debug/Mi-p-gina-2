<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página Web</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        nav {
            background-color: #555;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .contenido {
            padding: 20px;
        }

        img {
            width: 200px;
            border-radius: 10px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.2);
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Bienvenido a mi página</h1>
    <p>Hecha por mí 😎</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
</nav>

<div class="contenido">
    <h2>Hola 👋</h2>
    <p>Esta es mi primera página web.</p>

    <h3>Mi imagen</h3>

    <!-- Cambia el nombre de la imagen por el tuyo -->
    <a href="IMG_3993.jpeg" target="_blank">
        <img src="IMG_3993.jpeg" alt="Mi imagen">
    </a>

    <p>Haz clic en la imagen para verla grande 🔍</p>
</div>

<footer>
    <p>© 2026 Mi página web</p>
</footer>

</body>
</html>
