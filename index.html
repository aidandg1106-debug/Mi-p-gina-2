<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página Web</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            text-align: center;

            /* 🌌 Fondo con efecto oscuro */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("IMG_3998.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;

            animation: moverFondo 20s infinite linear;
        }

        /* 🌌 Animación del fondo */
        @keyframes moverFondo {
            0% { background-position: center; }
            50% { background-position: top; }
            100% { background-position: center; }
        }

        header {
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
        }

        nav {
            background-color: rgba(0,0,0,0.6);
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00ffcc;
        }

        /* ✨ Glass effect */
        .contenido {
            padding: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            margin: 20px;
            backdrop-filter: blur(10px);

            animation: aparecer 1.5s ease;
        }

        /* 🚀 Animación entrada */
        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        img {
            width: 200px;
            border-radius: 10px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.2);
        }

        footer {
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Bienvenido a mi página 🚀</h1>
    <p>Hecha por mí 😎</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Sobre mí</a>
    <a href="#">Contacto</a>
</nav>


    <a href="IMG_3993.jpeg" target="_blank">
        <img src="IMG_3993.jpeg" alt="Mi imagen">
    </a>

<footer>
    <p>© 2026 Mi página web</p>
</footer>

</body>
</html>
